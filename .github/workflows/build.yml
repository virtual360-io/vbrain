name: build

# On every commit to main: run the tests, rebuild the vbrain binary for all
# targets, and publish a versioned tag + release with an auto-generated
# changelog. Everything is pure-Go (modernc.org/sqlite, go-git, chromedp), so it
# cross-compiles from a single runner with CGO_ENABLED=0 â€” no OS matrix.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write # create tags and releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --generate-notes can diff against the previous tag

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Test
        run: go test ./...

      - name: Build (cross-platform)
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          ver="v0.1.${{ github.run_number }}"
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for t in $targets; do
            os="${t%/*}"; arch="${t#*/}"
            # Human-friendly asset name (kept in sync with internal/selfupdate
            # AssetName): darwinâ†’macos, amd64â†’intel, arm64â†’apple-silicon on macOS.
            name_os="$os"; [ "$os" = "darwin" ] && name_os="macos"
            name_arch="$arch"; [ "$arch" = "amd64" ] && name_arch="intel"
            [ "$arch" = "arm64" ] && [ "$name_os" = "macos" ] && name_arch="apple-silicon"
            out="dist/vbrain-${name_os}-${name_arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "â†’ $out"
            GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.version=${ver}" -o "$out" ./cmd/vbrain
          done
          (cd dist && sha256sum vbrain-* > SHA256SUMS)
          ls -la dist

      - name: Tag + release with changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Monotonic version from the run number (e.g. v0.1.42). gh creates the
          # tag at this commit. The changelog is the list of commits since the
          # previous versioned tag â€” commit-based (not PR-based), because changes
          # land as direct commits to main here.
          tag="v0.1.${{ github.run_number }}"
          prev=$(git tag -l 'v0.1.*' | sort -V | tail -n1)
          range="HEAD"; [ -n "$prev" ] && range="${prev}..HEAD"
          changelog=$(git log --no-merges --pretty='- %s (%h)' "$range")
          [ -z "$changelog" ] && changelog="- no changes"
          body=$(printf '## Changes since %s\n\n%s' "${prev:-the beginning}" "$changelog")
          gh release create "$tag" dist/* \
            --title "$tag" \
            --target "$GITHUB_SHA" \
            --notes "$body"

      - name: Update rolling "latest" (back-compat for already-shipped binaries)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # `vbrain update` from older binaries fetches /releases/download/latest;
          # keep that tag pointing at the freshest build so they keep working.
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest dist/* --clobber
          else
            gh release create latest dist/* \
              --title latest --notes "Rolling latest build." --prerelease
          fi

      - name: Bump Homebrew formula
        run: |
          # Regenerate Formula/vbrain.rb (the in-repo tap) to point at this
          # release's binaries + their SHA256, then commit it back to main. The
          # [skip ci] marker stops this commit from re-triggering the build.
          tag="v0.1.${{ github.run_number }}"
          ver="0.1.${{ github.run_number }}"
          base="https://github.com/${{ github.repository }}/releases/download/${tag}"
          sha() { awk -v f="$1" '$2==f{print $1}' dist/SHA256SUMS; }
          mkdir -p Formula
          cat > Formula/vbrain.rb <<EOF
          # Generated by .github/workflows/build.yml on each release â€” do not edit by hand.
          class Vbrain < Formula
            desc "Personal knowledge base â€” Claude Code skills + Go binary + SQLite FTS5"
            homepage "https://github.com/${{ github.repository }}"
            version "${ver}"

            on_macos do
              on_arm do
                url "${base}/vbrain-macos-apple-silicon"
                sha256 "$(sha vbrain-macos-apple-silicon)"
              end
              on_intel do
                url "${base}/vbrain-macos-intel"
                sha256 "$(sha vbrain-macos-intel)"
              end
            end

            on_linux do
              on_arm do
                url "${base}/vbrain-linux-arm64"
                sha256 "$(sha vbrain-linux-arm64)"
              end
              on_intel do
                url "${base}/vbrain-linux-intel"
                sha256 "$(sha vbrain-linux-intel)"
              end
            end

            def install
              bin.install Dir["vbrain-*"].first => "vbrain"
            end

            def caveats
              <<~CAVEATS
                Next, install the Claude Code skills and bootstrap your base (~/vbrain):
                  vbrain install
              CAVEATS
            end

            test do
              assert_match "usage: vbrain", shell_output("#{bin}/vbrain 2>&1", 2)
            end
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vbrain.rb
          git diff --cached --quiet || git commit -m "chore(homebrew): vbrain ${ver} [skip ci]"
          git push origin HEAD:main
